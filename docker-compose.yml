version: "3.9"

services:
  api:
    build:
      context: ./api
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    restart: unless-stopped

  web:
    build:
      context: ./web
    env_file:
      - .env.example
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

  bot:
    build:
      context: ./bot
    env_file:
      - .env.example
    depends_on:
      - api
    restart: unless-stopped
