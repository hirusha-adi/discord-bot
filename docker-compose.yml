services:
  api:
    build:
      context: ./api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/data
    restart: unless-stopped

  web:
    build:
      context: ./web
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

  bot:
    build:
      context: ./bot
    env_file:
      - .env
    depends_on:
      - api
    volumes:
      - sqlite_data:/data
    restart: unless-stopped

  worker:
    build:
      context: ./api
    env_file:
      - .env
    depends_on:
      - api
    volumes:
      - sqlite_data:/data
    command: ["python", "-m", "app.announcement_worker"]
    restart: unless-stopped

volumes:
  sqlite_data:
