version: "3.9"

services:
  api:
    build:
      context: ../api
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    volumes:
      - app_data:/data
    restart: unless-stopped

  web:
    build:
      context: ../web
    env_file:
      - ../.env
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

  bot:
    build:
      context: ../bot
    env_file:
      - ../.env
    depends_on:
      - api
    volumes:
      - app_data:/data
    restart: unless-stopped

volumes:
  app_data:
    driver: local
